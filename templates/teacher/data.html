{% extends 'base.html' %}
{% block content %}
<div class="fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="color: var(--secondary);">Teacher Faculty</h2>
        <a href="{% url 'teacher:insert' %}" class="btn" style="background: var(--secondary); color: white;">+ Add Teacher</a>
    </div>
    <div class="table-container">
        <table>
            <thead><tr><th>Emp ID</th><th>Name</th><th>Email</th><th>Subject</th><th>Actions</th></tr></thead>
            <tbody>
                {% for teacher in teachers %}
                <tr>
                    <td>{{ teacher.empid }}</td><td>{{ teacher.name }}</td><td>{{ teacher.email }}</td><td>{{ teacher.subject }}</td>
                    <td class="actions">
                        <a href="{% url 'teacher:update_teach' teacher.id %}" class="btn" style="color: var(--success);">Edit</a>
                        <a href="{% url 'teacher:delete_teach' teacher.id %}" class="btn" style="color: var(--danger);">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
