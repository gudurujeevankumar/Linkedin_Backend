{% extends 'base.html' %}
{% block title %}Update Student - Portal{% endblock %}
{% block content %}
<div class="card fade-in" style="max-width: 600px; margin: 2rem auto;">
    <h2>Update Student</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label for="roll">Roll Number</label><input type="text" id="roll" name="roll" value="{{ student.roll }}" required></div>
        <div class="form-group"><label for="name">Full Name</label><input type="text" id="name" name="name" value="{{ student.name }}" required></div>
        <div class="form-group"><label for="age">Age</label><input type="number" id="age" name="age" value="{{ student.age }}" required></div>
        <div class="form-group"><label for="email">Email Address</label><input type="email" id="email" name="email" value="{{ student.email }}" required></div>
        <div class="form-group"><label for="branch">Branch</label><input type="text" id="branch" name="branch" value="{{ student.branch }}" required></div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Update Information</button>
    </form>
</div>
{% endblock %}
