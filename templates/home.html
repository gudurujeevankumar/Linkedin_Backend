<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button-group {
            display: flex;
            gap: 2rem;
        }

        .btn {
            padding: 2rem 4rem;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            border-radius: 1rem;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 250px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .btn-student { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .btn-teacher { background: linear-gradient(135deg, #ec4899, #f43f5e); }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Portal</h1>
        <div class="button-group">
            <a href="{% url 'insert' %}" class="btn btn-student">
                <span class="icon">🎓</span> Student
            </a>
            <a href="{% url 'teacher:insert' %}" class="btn btn-teacher">
                <span class="icon">👨‍🏫</span> Teacher
            </a>
        </div>
    </div>
</body>
</html>
