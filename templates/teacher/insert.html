{% extends 'base.html' %}
{% block content %}
<div class="card fade-in" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="color: var(--secondary);">Register Teacher</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label>Employee ID</label><input type="text" name="empid" required></div>
        <div class="form-group"><label>Full Name</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>Subject</label><input type="text" name="subject" required></div>
        <button type="submit" class="btn" style="width: 100%; background: var(--secondary); color: white;">Insert Teacher</button>
    </form>
</div>
{% endblock %}
