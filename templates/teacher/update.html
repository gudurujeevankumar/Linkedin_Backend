{% extends 'base.html' %}
{% block content %}
<div class="card fade-in" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="color: var(--secondary);">Update Teacher</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group"><label>Employee ID</label><input type="text" name="empid" value="{{ teacher.empid }}" required></div>
        <div class="form-group"><label>Full Name</label><input type="text" name="name" value="{{ teacher.name }}" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ teacher.email }}" required></div>
        <div class="form-group"><label>Subject</label><input type="text" name="subject" value="{{ teacher.subject }}" required></div>
        <button type="submit" class="btn" style="width: 100%; background: var(--secondary); color: white;">Update Information</button>
    </form>
</div>
{% endblock %}
