<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All data</title>
</head>
<body>
    <h2>Student Records</h2>

    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Roll</th>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Branch</th>
                <th>Update</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.roll }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.age }}</td>
                <td>{{ student.email }}</td>
                <td>{{ student.branch }}</td>
                <td><a href="/student/update/{{ student.id }}">Update</a></td>
                <td><a href="/student/delete/{{ student.id }}">Delete</a></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="7">No student records found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
